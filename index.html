<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday Swastika 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    body {
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      background: #ffe0ec;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 10% 5%,  #ffb3cc 0%, transparent 55%),
        radial-gradient(ellipse 55% 65% at 90% 95%, #d9b3f5 0%, transparent 55%),
        radial-gradient(ellipse 60% 45% at 55% 45%, #b3d9a0 0%, transparent 50%),
        #ffe0ec;
      z-index: 0;
    }

    /* ── SPARKLES ── */
    .sparkle-field { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
    .sparkle { position: absolute; opacity: 0; animation: sparkleAnim var(--dur) var(--delay) infinite ease-in-out; }
    .sparkle::before, .sparkle::after { content: ''; position: absolute; border-radius: 50%; background: #d63065; }
    .sparkle::before { width: 100%; height: 2px; top: 50%; left: 0; transform: translateY(-50%); }
    .sparkle::after  { width: 2px; height: 100%; top: 0; left: 50%; transform: translateX(-50%); }
    .sparkle.gold::before,  .sparkle.gold::after  { background: #b8761a; }
    .sparkle.lilac::before, .sparkle.lilac::after { background: #9a4fc7; }
    .sparkle.sage::before,  .sparkle.sage::after  { background: #3a8a3a; }
    @keyframes sparkleAnim {
      0%   { opacity: 0; transform: scale(0) rotate(0deg); }
      30%  { opacity: 1; transform: scale(1.4) rotate(45deg); }
      100% { opacity: 0; transform: scale(0) rotate(180deg); }
    }

    /* ── PETALS ── */
    .petal-float { position: fixed; pointer-events: none; z-index: 2; font-size: 1.2rem; opacity: 0; animation: petalFall var(--fdur) var(--fdelay) infinite linear; }
    @keyframes petalFall {
      0%   { opacity: 0; transform: translateY(-30px) rotate(0deg); }
      10%  { opacity: 0.9; }
      90%  { opacity: 0.5; }
      100% { opacity: 0; transform: translateY(105vh) rotate(400deg); }
    }

    /* ── ENVELOPE SCENE ── */
    .scene {
      position: relative; z-index: 10;
    }

    /* ── ENVELOPE ── */
    .envelope-wrap {
      width: 360px; height: 250px;
      position: relative;
      cursor: pointer;
      animation: envFloat 3.5s ease-in-out infinite;
      transition: opacity 0.5s, filter 0.5s;
    }
    @keyframes envFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%       { transform: translateY(-12px) rotate(1deg); }
    }
    .envelope-wrap:hover { animation: none; transform: scale(1.05) rotate(-1.5deg); }
    .envelope-wrap.faded { opacity: 0.15; filter: blur(6px); pointer-events: none; }

    .env-body {
      position: absolute; inset: 0;
      background: linear-gradient(145deg, #f472a0 0%, #e8558a 50%, #d43070 100%);
      border-radius: 8px 8px 14px 14px;
      box-shadow: 0 16px 55px rgba(180,30,80,0.45), 0 4px 12px rgba(180,30,80,0.25), inset 0 1px 0 rgba(255,255,255,0.4);
    }
    .env-left, .env-right { position: absolute; bottom: 0; width: 0; height: 0; border-style: solid; z-index: 2; }
    .env-left  { left: 0;  border-width: 125px 0 0 180px; border-color: transparent transparent transparent #c02060; }
    .env-right { right: 0; border-width: 125px 180px 0 0; border-color: transparent #c02060 transparent transparent; }
    .env-bottom {
      position: absolute; bottom: 0; left: 0; right: 0; height: 125px; z-index: 1;
      background:
        linear-gradient(to bottom right, transparent 50%, #d83878 50%) left / 50% 100% no-repeat,
        linear-gradient(to bottom left,  transparent 50%, #d83878 50%) right / 50% 100% no-repeat;
    }
    .env-flap {
      position: absolute; top: 0; left: 0;
      width: 0; height: 0; border-style: solid;
      border-width: 0 180px 138px 180px;
      border-color: transparent transparent #f472a0 transparent;
      transform-origin: top center;
      transition: transform 0.65s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 6;
      filter: drop-shadow(0 6px 10px rgba(180,30,80,0.3));
    }
    .env-flap.open { transform: rotateX(-180deg); }

    .seal {
      position: absolute; top: 48%; left: 50%;
      transform: translate(-50%, -50%);
      width: 58px; height: 58px;
      background: radial-gradient(circle at 38% 35%, #ff6090, #aa1040);
      border-radius: 50%; z-index: 7;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
      box-shadow: 0 4px 14px rgba(170,16,64,0.55), inset 0 1px 3px rgba(255,255,255,0.35);
      transition: transform 0.35s ease, opacity 0.35s ease;
    }
    .seal.gone { transform: translate(-50%, -50%) scale(0); opacity: 0; }

    .hint {
      position: absolute; bottom: -42px; left: 50%;
      transform: translateX(-50%);
      font-family: 'Dancing Script', cursive;
      font-size: 1.1rem; color: #aa1040; font-weight: 600;
      white-space: nowrap; pointer-events: none;
      animation: hintPulse 2.2s ease-in-out infinite;
      text-shadow: 0 1px 4px rgba(255,255,255,0.7);
      transition: opacity 0.3s;
    }
    .hint.hidden { opacity: 0; }
    @keyframes hintPulse {
      0%, 100% { opacity: 0.6; transform: translateX(-50%) translateY(0); }
      50%       { opacity: 1;   transform: translateX(-50%) translateY(-4px); }
    }

    /* ── RISING CARD INSIDE ENVELOPE ── */
    /* This is just a visual placeholder that rises — real card is separate */
    .card-riser {
      position: absolute;
      left: 24px; right: 24px; bottom: 10px;
      height: 210px;
      background: #fff0f5;
      border-radius: 10px;
      border: 2px solid #e8558a;
      z-index: 3;
      transform: translateY(0);
      transition: transform 0.85s cubic-bezier(0.22, 1, 0.36, 1) 0.1s;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 24px rgba(180,30,80,0.22);
    }
    .card-riser.risen { transform: translateY(-230px); }

    .card-peek {
      font-family: 'Dancing Script', cursive;
      font-size: 1.2rem; font-weight: 700; color: #c02060;
      opacity: 0; transition: opacity 0.4s 0.6s; pointer-events: none;
    }
    .card-peek.show { opacity: 1; }

    /* ── OVERLAY ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(220,50,100,0.2);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 50;
      opacity: 0; pointer-events: none;
      transition: opacity 0.5s;
    }
    .overlay.show { opacity: 1; pointer-events: all; }

    /* ── FULL CARD (separate from envelope DOM) ── */
    .full-card {
      position: fixed;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%) scale(0.85);
      width: min(500px, 92vw);
      min-height: 520px;
      background: #fff0f5;
      border-radius: 28px;
      border: 2.5px solid #e8558a;
      z-index: 100;
      padding: 2.8rem 2.4rem 2.2rem;
      box-shadow: 0 30px 100px rgba(180,30,80,0.38), 0 6px 24px rgba(180,30,80,0.2), inset 0 1px 0 #fff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; gap: 0.55rem;
      opacity: 0; pointer-events: none;
      transition: opacity 0.5s, transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .full-card.show {
      opacity: 1; pointer-events: all;
      transform: translate(-50%, -50%) scale(1);
    }

    /* Card content */
    .cc-ribbon { display: flex; align-items: center; gap: 0.5rem; width: 100%; }
    .cc-line { flex: 1; height: 1.5px; background: linear-gradient(to right, transparent, #e8558a, transparent); }
    .cc-tag { font-family: 'Dancing Script', cursive; font-size: 0.9rem; color: #c02060; font-weight: 600; letter-spacing: 0.1em; }

    .cc-cake { font-size: 3.5rem; animation: cakeBounce 2s ease-in-out infinite; }
    @keyframes cakeBounce {
      0%,100% { transform: translateY(0) rotate(-2deg); }
      50%      { transform: translateY(-8px) rotate(2deg); }
    }

    .cc-sub {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: 0.95rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: #c02060; font-weight: 700;
    }

    .cc-name {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(2.8rem, 8vw, 3.8rem);
      color: #7a1030; font-weight: 700; line-height: 1.1;
    }
    .cc-name::after {
      content: ''; display: block; height: 2.5px; border-radius: 2px;
      background: linear-gradient(to right, transparent, #e8558a 35%, #b8761a 65%, transparent);
      margin-top: 0.1rem;
    }

    .cc-flowers { font-size: 1rem; letter-spacing: 0.3rem; }

    .cc-msg {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: clamp(1rem, 2.4vw, 1.15rem);
      color: #8b2040; line-height: 1.85;
    }

    .cc-date {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: linear-gradient(135deg, #ffb3cc, #ffdde8);
      border: 1.5px solid #e8558a; border-radius: 50px;
      padding: 0.42rem 1.3rem;
      font-size: 0.85rem; color: #aa1040;
      font-family: 'Playfair Display', serif; letter-spacing: 0.08em; font-weight: 700;
      box-shadow: 0 2px 10px rgba(180,30,80,0.2);
    }

    .cc-close {
      background: #e8558a; border: none; border-radius: 50px;
      padding: 0.45rem 1.6rem;
      font-family: 'Dancing Script', cursive; font-size: 1rem; color: #fff; font-weight: 700;
      cursor: pointer; transition: background 0.2s, transform 0.2s;
      box-shadow: 0 2px 8px rgba(180,30,80,0.3);
    }
    .cc-close:hover { background: #c02060; transform: scale(1.05); }

    /* cursor spark */
    .cspark {
      position: fixed; pointer-events: none; z-index: 999; font-size: 1.1rem;
      animation: csFade 0.85s ease-out forwards;
    }
    @keyframes csFade {
      0%   { opacity: 1; transform: scale(1) translateY(0); }
      100% { opacity: 0; transform: scale(0.2) translateY(-24px); }
    }
  </style>
</head>
<body>

  <div class="sparkle-field" id="sparkleField"></div>
  <div id="petalField"></div>

  <!-- Overlay behind full card -->
  <div class="overlay" id="overlay"></div>

  <!-- ENVELOPE -->
  <div class="scene">
    <div class="envelope-wrap" id="envWrap">
      <div class="env-body"></div>
      <div class="env-bottom"></div>
      <div class="env-left"></div>
      <div class="env-right"></div>
      <div class="env-flap" id="envFlap"></div>
      <div class="seal" id="seal">🌸</div>

      <!-- Rising card placeholder -->
      <div class="card-riser" id="cardRiser">
        <div class="card-peek" id="cardPeek">for Swastika ✨</div>
      </div>

      <div class="hint" id="hint">tap to open 🌸</div>
    </div>
  </div>

  <!-- FULL CARD — completely outside envelope, no clipping -->
  <div class="full-card" id="fullCard">
    <div class="cc-ribbon">
      <div class="cc-line"></div>
      <span class="cc-tag">✦ HBD ✦</span>
      <div class="cc-line"></div>
    </div>

    <div class="cc-cake">🎂</div>
    <div class="cc-sub">Happy Birthday</div>
    <div class="cc-name">Swastika</div>
    <div class="cc-flowers">🌷 🌸 🌼 🌸 🌷</div>

    <p class="cc-msg">
      May your day bloom as beautifully<br/>
      as the flowers of spring —<br/>
      filled with sweetness, laughter,<br/>
      and all the loveliest things. 🎀
    </p>

    <div class="cc-date">🌸 &nbsp; March 16th &nbsp; 🌸</div>
    <button class="cc-close" id="closeBtn">close ✦</button>
  </div>

  <script>
    const envWrap  = document.getElementById('envWrap');
    const envFlap  = document.getElementById('envFlap');
    const seal     = document.getElementById('seal');
    const cardRiser= document.getElementById('cardRiser');
    const cardPeek = document.getElementById('cardPeek');
    const hint     = document.getElementById('hint');
    const overlay  = document.getElementById('overlay');
    const fullCard = document.getElementById('fullCard');
    const closeBtn = document.getElementById('closeBtn');
    let state = 'closed';

    envWrap.addEventListener('click', () => {
      if (state !== 'closed') return;
      state = 'opening';

      // 1. Open flap + hide seal + hide hint
      envFlap.classList.add('open');
      seal.classList.add('gone');
      hint.classList.add('hidden');

      // 2. Rise card after short delay
      setTimeout(() => {
        cardRiser.classList.add('risen');
        cardPeek.classList.add('show');
      }, 200);

      // 3. Show full card + overlay after card has risen
      setTimeout(() => {
        state = 'expanded';
        envWrap.classList.add('faded');
        overlay.classList.add('show');
        fullCard.classList.add('show');
        burst();
      }, 1050);
    });

    function closeCard() {
      if (state !== 'expanded') return;
      fullCard.classList.remove('show');
      overlay.classList.remove('show');
      envWrap.classList.remove('faded');

      setTimeout(() => {
        cardRiser.classList.remove('risen');
        cardPeek.classList.remove('show');
        envFlap.classList.remove('open');
        seal.classList.remove('gone');
        hint.classList.remove('hidden');
        state = 'closed';
      }, 550);
    }

    closeBtn.addEventListener('click', e => { e.stopPropagation(); closeCard(); });
    overlay.addEventListener('click', closeCard);

    // ── Sparkles ──
    const sf = document.getElementById('sparkleField');
    const sc = ['','gold','lilac','sage'];
    for (let i = 0; i < 55; i++) {
      const s = document.createElement('div');
      s.className = 'sparkle ' + sc[Math.floor(Math.random()*sc.length)];
      s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${2+Math.random()*3}s;--delay:${Math.random()*5}s;width:${5+Math.random()*8}px;height:${5+Math.random()*8}px;`;
      sf.appendChild(s);
    }

    // ── Petals ──
    const pf = document.getElementById('petalField');
    const pe = ['🌸','🌷','🌼','✿','❀'];
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'petal-float';
      p.textContent = pe[Math.floor(Math.random()*pe.length)];
      p.style.cssText = `left:${Math.random()*100}%;--fdur:${6+Math.random()*8}s;--fdelay:${Math.random()*10}s;`;
      pf.appendChild(p);
    }

    // ── Burst ──
    function burst() {
      const em = ['✨','🌸','💫','⭐','🌷','🎀','✦','🌼'];
      for (let i = 0; i < 24; i++) {
        setTimeout(() => {
          const el = document.createElement('div');
          el.className = 'cspark';
          el.textContent = em[Math.floor(Math.random()*em.length)];
          el.style.left = (10 + Math.random()*80) + 'vw';
          el.style.top  = (5  + Math.random()*90) + 'vh';
          el.style.fontSize = (1 + Math.random()*1.5) + 'rem';
          document.body.appendChild(el);
          setTimeout(() => el.remove(), 900);
        }, i * 50);
      }
    }

    // ── Cursor trail ──
    const trail = ['✨','🌸','⭐','💫','🌷','✦'];
    document.addEventListener('mousemove', e => {
      if (Math.random() > 0.84) {
        const el = document.createElement('div');
        el.className = 'cspark';
        el.textContent = trail[Math.floor(Math.random()*trail.length)];
        el.style.left = e.clientX + 'px';
        el.style.top  = e.clientY + 'px';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 850);
      }
    });
  </script>
</body>
</html>
